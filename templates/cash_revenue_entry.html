<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OptiGain • Cash Revenue</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>

<body class="min-h-screen bg-sky-50 dark:bg-slate-950 transition-colors">

<div id="network-status"
        class="text-center text-xs py-2 font-medium">
</div>

<!-- HEADER -->
<header
  class="flex items-center justify-between px-6 py-4
         bg-white dark:bg-slate-900
         border-b border-slate-200 dark:border-slate-800"
>
  <h1 class="text-lg font-semibold text-slate-900 dark:text-white">
    💵 Cash Revenue Entry
  </h1>

<a href="{{ url_for('dashboard') }}"
   class="block px-4 py-2.5 rounded-lg text-sm font-medium
          text-slate-600 dark:text-slate-300
          hover:bg-blue-600 hover:text-white
          transition-all duration-200">

    ⬅ Dashboard
  </a>
</header>


<!-- MAIN -->
<main class="flex items-center justify-center px-4 py-10">

  <div
    class="w-full max-w-md
           bg-white dark:bg-slate-900
           border border-slate-200 dark:border-slate-800
           rounded-2xl shadow-lg p-8"
  >

    <div class="text-center mb-6">
      <h2 class="text-xl font-semibold text-slate-900 dark:text-white">
        Add Cash Payment
      </h2>
      <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">
        Record money received outside MPesa (cash, bank transfer, POS)
      </p>
    </div>

    <form id="cashForm" method="POST" class="space-y-4">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Date -->
      <div>
        <label class="block text-sm font-medium mb-1">
          Date
        </label>
        <input
          type="date"
          name="date"
          required
          class="w-full rounded-lg border px-3 py-2 text-sm
                 bg-white dark:bg-slate-800
                 border-slate-300 dark:border-slate-700"
        >
      </div>

      <!-- Amount -->
      <div>
        <label class="block text-sm font-medium mb-1">
          Amount (KSh)
        </label>
        <input
          type="number"
          name="amount"
          step="0.01"
          required
          placeholder="e.g. 500"
          class="w-full rounded-lg border px-3 py-2 text-sm
                 bg-white dark:bg-slate-800
                 border-slate-300 dark:border-slate-700"
        >
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium mb-1">
          Description (optional)
        </label>
        <input
          type="text"
          name="description"
          placeholder="Cash sale, walk-in customer, POS"
          class="w-full rounded-lg border px-3 py-2 text-sm
                 bg-white dark:bg-slate-800
                 border-slate-300 dark:border-slate-700"
        >
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="w-full bg-green-600 hover:bg-green-700
               text-white font-medium py-2 rounded-lg transition"
      >
        Save Cash Revenue
      </button>

    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-4 text-center">
          {% for category, message in messages %}
            <p class="text-sm text-green-600">
              {{ message }}
            </p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

  </div>
</main>

<script>

// ================= OFFLINE SAVE =================
document.getElementById("cashForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    const data = {
        date: formData.get("date"),
        amount: formData.get("amount"),
        description: formData.get("description")
    };

    // 🟢 TRY ONLINE FIRST
        const csrf = document.querySelector('[name="csrf_token"]').value;

fetch("/revenue/cash", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrf
    },
    body: JSON.stringify(data)
})
    .then(r => {
        if (!r.ok) throw new Error("Server error");
        return r.json();
    })
    .then(() => {
        alert("✅ Cash saved");
        this.reset();
    })
    .catch(err => {

    console.log("ERROR:", err);

    if (!navigator.onLine) {

        // ✅ REAL OFFLINE
        let queue = JSON.parse(localStorage.getItem("offline_queue") || "[]");

        queue.push({
            type: "cash",
            data: data,
            synced: false
        });

        localStorage.setItem("offline_queue", JSON.stringify(queue));

        alert("📴 Saved offline — will sync later");

    } else {

        // ❌ SERVER / CSRF / ROUTE ERROR
        alert("❌ Server error — check logs");

    }

    this.reset();
});
});

// ================= NETWORK STATUS =================
function updateNetworkStatus() {
    const el = document.getElementById("network-status");

    if (!el) return;

    if (navigator.onLine) {
        el.innerText = "🟢 Online — syncing...";
        el.className = "text-center text-xs py-2 bg-green-500 text-white";
    } else {
        el.innerText = "🔴 Offline — auto sync when back";
        el.className = "text-center text-xs py-2 bg-red-500 text-white";
    }
}

window.addEventListener("online", updateNetworkStatus);
window.addEventListener("offline", updateNetworkStatus);

// run once
updateNetworkStatus();

</script>

<script>
let dashboardHTML = null;

// preload dashboard in background
fetch("/dashboard")
  .then(res => res.text())
  .then(html => {
    dashboardHTML = html;
  });

// intercept dashboard click
document.addEventListener("click", function(e) {
  const link = e.target.closest("a");
  if (!link) return;

  const href = link.getAttribute("href");

  if (href === "/dashboard" && dashboardHTML) {
    e.preventDefault();

    document.open();
    document.write(dashboardHTML);
    document.close();
  }
});
</script>

</body>
</html>
