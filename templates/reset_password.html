<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<title>Reset Password – OptiGain</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="min-h-screen flex items-center justify-center"
      style="background: var(--og-surface); color: var(--og-text-main);">

<div class="w-full max-w-md p-8 rounded-2xl shadow-xl border backdrop-blur-sm"
     style="background: var(--og-surface); border:1px solid var(--og-border-subtle);">

<h2 class="text-2xl font-bold mb-2 text-center">
Create New Password
</h2>

<p class="text-sm text-center opacity-70 mb-6">
Use a strong password to secure your account
</p>

<form method="POST" class="space-y-4">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<!-- PASSWORD -->
<div class="relative">
<input
id="password"
type="password"
name="password"
required
placeholder="New password"
class="w-full rounded-lg px-4 py-3 pr-10 border focus:ring-2 focus:ring-[var(--og-primary)]"
style="background: var(--og-surface); border-color: var(--og-border-subtle);"
/>

<button type="button"
onclick="togglePassword('password', this)"
class="absolute right-3 top-3 opacity-70 hover:opacity-100">
<i data-lucide="eye"></i>
</button>
</div>

<!-- CONFIRM -->
<div class="relative">
<input
id="confirm_password"
type="password"
name="confirm_password"
required
placeholder="Confirm password"
class="w-full rounded-lg px-4 py-3 pr-10 border focus:ring-2 focus:ring-[var(--og-primary)]"
style="background: var(--og-surface); border-color: var(--og-border-subtle);"
/>

<button type="button"
onclick="togglePassword('confirm_password', this)"
class="absolute right-3 top-3 opacity-70 hover:opacity-100">
<i data-lucide="eye"></i>
</button>
</div>

<button
type="submit"
class="w-full py-3 rounded-lg text-white font-semibold hover:opacity-90"
style="background: var(--og-primary);">
Reset Password
</button>

</form>

</div>

<script>
function togglePassword(id, btn){
  const input = document.getElementById(id);
  const icon = btn.querySelector("i");

  if(input.type === "password"){
    input.type = "text";
    icon.setAttribute("data-lucide","eye-off");
  } else {
    input.type = "password";
    icon.setAttribute("data-lucide","eye");
  }

  lucide.createIcons();
}
</script>

<script>
lucide.createIcons();
</script>

</body>
</html>
