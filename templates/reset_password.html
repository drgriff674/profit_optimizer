<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<title>Reset Password – OptiGain</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden"
style="
background:
radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 35%),
radial-gradient(circle at bottom right, rgba(59,130,246,0.14), transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
">

<!-- Background Glow -->
<div class="absolute inset-0 opacity-30 pointer-events-none">

<div class="absolute top-[-120px] left-[-120px]
w-96 h-96 bg-blue-500 rounded-full blur-3xl">
</div>

<div class="absolute bottom-[-120px] right-[-120px]
w-96 h-96 bg-indigo-500 rounded-full blur-3xl">
</div>

</div>

<!-- Card -->
<div class="relative z-10 w-full max-w-md p-8 rounded-3xl border backdrop-blur-xl shadow-2xl"
style="
background: rgba(15,23,42,0.82);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.45);
">
<div class="flex justify-center mb-5">

<div class="w-16 h-16 rounded-2xl flex items-center justify-center"
style="
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 30px rgba(37,99,235,0.45);
">

<i data-lucide="lock-keyhole" class="w-8 h-8 text-white"></i>

</div>

</div>

<h2 class="text-3xl font-bold mb-3 text-center tracking-tight">
Create New Password
</h2>

<p class="text-sm text-center text-slate-300 mb-7 leading-relaxed">
Use a strong password to protect your OptiGain account and business data.
</p>

<form method="POST" class="space-y-4">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<!-- PASSWORD -->
<div class="relative">
<input
id="password"
type="password"
name="password"
required
placeholder="New password"
class="w-full rounded-2xl px-4 py-3 pr-10 border transition-all duration-200 focus:ring-2"
style="
background: rgba(255,255,255,0.04);
border-color: rgba(255,255,255,0.08);
color:white;
backdrop-filter: blur(10px);
"
/>

<button type="button"
onclick="togglePassword('password', this)"
class="absolute right-3 top-3 opacity-70 hover:opacity-100">
<i data-lucide="eye"></i>
</button>
</div>

<!-- CONFIRM -->
<div class="relative">
<input
id="confirm_password"
type="password"
name="confirm_password"
required
placeholder="Confirm password"
class="w-full rounded-2xl px-4 py-3 pr-10 border transition-all duration-200 focus:ring-2"
style="
background: rgba(255,255,255,0.04);
border-color: rgba(255,255,255,0.08);
color:white;
backdrop-filter: blur(10px);
"
/>

<button type="button"
onclick="togglePassword('confirm_password', this)"
class="absolute right-3 top-3 opacity-70 hover:opacity-100">
<i data-lucide="eye"></i>
</button>
</div>

<button
type="submit"
class="w-full py-3 rounded-2xl text-white font-semibold transition-all duration-200 hover:scale-[1.02] hover:opacity-95"
style="
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
">
Reset Password
</button>

</form>

</div>

<script>
function togglePassword(id, btn){
  const input = document.getElementById(id);
  const icon = btn.querySelector("i");

  if(input.type === "password"){
    input.type = "text";
    icon.setAttribute("data-lucide","eye-off");
  } else {
    input.type = "password";
    icon.setAttribute("data-lucide","eye");
  }

  lucide.createIcons();
}
</script>

<script>
lucide.createIcons();
</script>

</body>
</html>
