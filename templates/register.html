<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <title>Register – OptiGain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-screen flex flex-col md:flex-row bg-slate-950">

<!-- LEFT PANEL -->
<div class="hidden md:flex md:w-1/2 items-center justify-center p-12 text-white"
     style="background: linear-gradient(135deg,#2563eb,#1e3a8a);">

  <div class="max-w-md">
    <h1 class="text-3xl font-bold mb-4">Start your business journey</h1>
    <p class="opacity-90 mb-6">
      Know your real profit. Track everything automatically.
    </p>

    <div class="space-y-2 text-sm">
      <div>💰 Revenue tracking</div>
      <div>📊 Profit insights</div>
      <div>🤖 AI forecasting</div>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div class="w-full md:w-1/2 flex items-center justify-center px-4 py-10">

  <!-- Dark toggle -->
  <button id="darkToggle"
    class="fixed top-5 right-5 w-11 h-11 rounded-full shadow-lg bg-blue-600 text-white">
    🌙
  </button>

  <!-- CARD -->
  <div class="w-full max-w-md rounded-2xl p-5 sm:p-8 shadow-xl border backdrop-blur-sm"
       style="background: var(--og-surface); border:1px solid var(--og-border-subtle);">

    <!-- HEADER -->
    <div class="text-center mb-6">
      <img src="{{ url_for('static', filename='logo.png') }}" class="w-20 mx-auto mb-3">
      <h1 class="text-xl font-bold">Create your OptiGain account</h1>
      <p class="text-sm opacity-70 mt-2">
        Start tracking, analyzing, and optimizing your finances
      </p>
    </div>

    <!-- MODE SELECT -->
    <div class="flex flex-col sm:flex-row gap-2 mb-4">

      <button type="button" onclick="setMode('normal')" id="btnNormal"
        class="flex-1 p-3 rounded-lg border text-left">
        👤 <b>Normal User</b><br>
        <span class="text-xs opacity-70">Till / manual payments</span>
      </button>

      <button type="button" onclick="setMode('paybill')" id="btnPaybill"
        class="flex-1 p-3 rounded-lg border text-left">
        🏢 <b>Paybill Business</b><br>
        <span class="text-xs opacity-70">Automatic tracking</span>
      </button>

    </div>

    <form method="POST" class="space-y-4">
      <input type="hidden" name="setup_type" id="setup_type" value="normal">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- USERNAME -->
      <input type="text" name="username" placeholder="Username" required
        class="w-full px-4 py-2 rounded-lg border bg-transparent">

      <!-- EMAIL -->
      <input type="email" name="email" placeholder="Email" required
        class="w-full px-4 py-2 rounded-lg border bg-transparent">

      <!-- PAYBILL FIELDS -->
      <div id="paybillFields" class="space-y-4 hidden">

        <input type="text" name="business_name" placeholder="Business Name"
          class="w-full px-4 py-2 rounded-lg border bg-transparent">

        <input type="text" name="paybill" placeholder="Paybill Number"
          class="w-full px-4 py-2 rounded-lg border bg-transparent">

        <input type="text" name="account_number" placeholder="Account Number (optional)"
          class="w-full px-4 py-2 rounded-lg border bg-transparent">

      </div>

      <!-- PASSWORD -->
      <div class="relative">
        <input id="password" type="password" name="password" placeholder="Password" required
          class="w-full px-4 py-2 rounded-lg border pr-10 bg-transparent">
        <button type="button" onclick="togglePassword('password', this)"
          class="absolute right-3 top-2">
          <i data-lucide="eye"></i>
        </button>
      </div>

      <!-- CONFIRM -->
      <div class="relative">
        <input id="confirm_password" type="password" name="confirm_password" placeholder="Confirm Password" required
          class="w-full px-4 py-2 rounded-lg border pr-10 bg-transparent">
        <button type="button" onclick="togglePassword('confirm_password', this)"
          class="absolute right-3 top-2">
          <i data-lucide="eye"></i>
        </button>
      </div>

      <!-- TERMS -->
      <label class="flex items-start gap-2 text-sm">
        <input type="checkbox" required>
        <span>
          I agree to the
          <a href="{{ url_for('terms') }}" class="text-blue-500">Terms</a>
          and
          <a href="{{ url_for('privacy') }}" class="text-blue-500">Privacy</a>
        </span>
      </label>

      <!-- SUBMIT -->
      <button type="submit"
        class="w-full py-3 rounded-lg bg-blue-600 text-white font-semibold">
        Create Account
      </button>

    </form>

    <!-- LOGIN -->
    <p class="text-sm text-center mt-4 opacity-70">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-blue-500 font-semibold">
        Login
      </a>
    </p>

  </div>
</div>

<!-- JS -->
<script>
function setMode(mode) {
  const paybillFields = document.getElementById("paybillFields");
  const hidden = document.getElementById("setup_type");

  const business = document.querySelector("input[name='business_name']");
  const paybill = document.querySelector("input[name='paybill']");

  hidden.value = mode;

  if (mode === "normal") {
    paybillFields.classList.add("hidden");
    business.required = false;
    paybill.required = false;
  } else {
    paybillFields.classList.remove("hidden");
    business.required = true;
    paybill.required = true;
  }
}

function togglePassword(id, btn) {
  const input = document.getElementById(id);
  const icon = btn.querySelector("i");

  if (input.type === "password") {
    input.type = "text";
    icon.setAttribute("data-lucide", "eye-off");
  } else {
    input.type = "password";
    icon.setAttribute("data-lucide", "eye");
  }

  lucide.createIcons();
}

document.addEventListener("DOMContentLoaded", () => {
  setMode("normal");

  const toggle = document.getElementById("darkToggle");
  const root = document.documentElement;

  if (localStorage.getItem("theme") === "dark") {
    root.classList.add("dark");
  }

  toggle.onclick = () => {
    const isDark = root.classList.toggle("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
  };
});

lucide.createIcons();
</script>

</body>
</html>
