<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <title>Register – OptiGain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind (layout only) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <!-- OptiGain theme -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="min-h-screen flex items-center justify-center transition-colors"
  style="background: var(--og-bg);">

  <!-- Dark mode toggle -->
  <button
    id="darkToggle"
    aria-pressed="false"
    title="Toggle theme"
    class="fixed top-5 right-5 w-11 h-11 rounded-full shadow-lg"
    style="background: var(--og-primary); color: white;"
  >
    🌙
  </button>

  <!-- Auth Card -->
  <div
    class="w-full max-w-md rounded-2xl shadow-xl p-8"
    style="background: var(--og-surface); color: var(--og-text-main); border-color: var(--og-border-subtle);"
  >

    <!-- Branding -->
    <div class="flex flex-col items-center mb-6">
      <img
        src="{{ url_for('static', filename='logo.png') }}"
        alt="OptiGain Logo"
        class="w-24 mb-3"
      />
      <h1 class="text-2xl font-bold text-center">
        Create your OptiGain account
      </h1>
      <p class="text-sm mt-1 opacity-70 text-center">
        Start tracking, analyzing, and optimizing your finances
      </p>
    </div>

    <!-- Register Form -->
   <form method="POST" class="space-y-4">

<div class="flex gap-2 mb-4">

  <button type="button" onclick="setMode('normal')" id="btnNormal"
    class="flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm">
    👤 Normal User
  </button>

  <button type="button" onclick="setMode('paybill')" id="btnPaybill"
    class="flex-1 py-2 rounded-lg bg-slate-200 text-sm">
    🏢 Paybill Business
  </button>

</div>

<input type="hidden" name="setup_type" id="setup_type" value="normal">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<!-- USERNAME -->
<div>
  <label class="block text-sm font-medium mb-1">Username</label>
  <input type="text" name="username" required
    class="w-full rounded-lg px-4 py-2 border focus:outline-none focus:ring-2 focus:ring-[var(--og-primary)]">
</div>

<!-- 🔥 WRAPPED SECTION STARTS HERE -->
<div id="paybillFields">

  <!-- EMAIL -->
  <div>
    <label class="block text-sm font-medium mb-1">Email</label>
    <input type="email" name="email"
      class="w-full rounded-lg px-4 py-2 border">
  </div>

  <!-- BUSINESS -->
  <div>
    <label class="block text-sm font-medium mb-1">Business Name</label>
    <input type="text" name="business_name"
      class="w-full rounded-lg px-4 py-2 border">
  </div>

  <!-- PAYBILL -->
  <div>
    <label class="block text-sm font-medium mb-1">Paybill Number</label>
    <input type="text" name="paybill"
      class="w-full rounded-lg px-4 py-2 border">
  </div>

  <!-- ACCOUNT -->
  <div>
    <label class="block text-sm font-medium mb-1">
      Account Number <span class="opacity-60">(optional)</span>
    </label>
    <input type="text" name="account_number"
      class="w-full rounded-lg px-4 py-2 border">
  </div>

</div>
<!-- 🔥 WRAPPED SECTION ENDS HERE -->

<!-- PASSWORD -->
<div>
  <label class="block text-sm font-medium mb-1">Password</label>
  <div class="relative">
    <input id="password" type="password" name="password" required
      class="w-full rounded-lg px-4 py-2 border pr-10">
    <button type="button" onclick="togglePassword('password', this)"
      class="absolute right-2 top-2">👁</button>
  </div>
</div>

<!-- CONFIRM -->
<div>
  <label class="block text-sm font-medium mb-1">Confirm Password</label>
  <div class="relative">
    <input id="confirm_password" type="password" name="confirm_password" required
      class="w-full rounded-lg px-4 py-2 border pr-10">
    <button type="button" onclick="togglePassword('confirm_password', this)"
      class="absolute right-2 top-2">👁</button>
  </div>
</div>

<!-- Terms & Privacy Agreement -->
<div class="text-sm mt-2">

<label class="flex items-start gap-2">

<input type="checkbox" required class="mt-1">

<span class="opacity-80">
I agree to the
<a href="{{ url_for('terms') }}" target="_blank"
   class="font-semibold hover:underline"
   style="color: var(--og-primary);">
   Terms of Service
</a>
and
<a href="{{ url_for('privacy') }}" target="_blank"
   class="font-semibold hover:underline"
   style="color: var(--og-primary);">
   Privacy Policy
</a>
</span>

</label>

</div>

<button type="submit"
  class="w-full py-2.5 rounded-lg font-semibold bg-blue-600 text-white">
  Create Account
</button>

</form>

    <!-- Links -->
    <p class="text-sm text-center mt-4 opacity-70">
      Already have an account?
      <a href="{{ url_for('login') }}"
         class="font-semibold hover:underline"
         style="color: var(--og-primary);">
        Login
      </a>
    </p>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-4 space-y-2">
          {% for category, msg in messages %}
            <div
              class="rounded-lg px-4 py-2 text-sm shadow"
              style="background: var(--og-surface-elevated);"
            >
              {{ msg }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

  </div>

  <!-- Dark Mode Script (style.css driven) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.getElementById("darkToggle");
      const root = document.documentElement;

      if (localStorage.getItem("theme") === "dark") {
        root.classList.add("dark");
        toggle.setAttribute("aria-pressed", "true");
      }

      toggle.addEventListener("click", () => {
        const isDark = root.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        toggle.setAttribute("aria-pressed", isDark ? "true" : "false");
      });
    });
  </script>

<script>
function togglePassword(fieldId, btn) {

  const field = document.getElementById(fieldId);

  if (field.type === "password") {
    field.type = "text";
    btn.innerText = "🙈";
  } else {
    field.type = "password";
    btn.innerText = "👁";
  }

}
</script>

<script>
function setMode(mode) {
  const paybillFields = document.getElementById("paybillFields");
  const hiddenInput = document.getElementById("setup_type");

  const btnNormal = document.getElementById("btnNormal");
  const btnPaybill = document.getElementById("btnPaybill");

  // 🔥 get inputs
  const email = document.querySelector("input[name='email']");
  const business = document.querySelector("input[name='business_name']");
  const paybill = document.querySelector("input[name='paybill']");

  hiddenInput.value = mode;

  if (mode === "normal") {
    paybillFields.style.display = "none";

    // ❌ remove required
    email.required = false;
    business.required = false;
    paybill.required = false;

    btnNormal.classList.add("bg-blue-600", "text-white");
    btnPaybill.classList.remove("bg-blue-600", "text-white");

  } else {
    paybillFields.style.display = "block";

    // ✅ make required
    email.required = true;
    business.required = true;
    paybill.required = true;

    btnPaybill.classList.add("bg-blue-600", "text-white");
    btnNormal.classList.remove("bg-blue-600", "text-white");
  }
}

// default
document.addEventListener("DOMContentLoaded", () => {
  setMode("normal");
});
</script>

</body>
</html>
