<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Access | OptiGain</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #111827,
                    #1e293b
                );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;
        }

        .card{

            width:100%;
            max-width:420px;

            background:rgba(17,24,39,0.95);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:24px;

            padding:40px;

            box-shadow:
                0 10px 40px rgba(0,0,0,0.45);

            backdrop-filter: blur(10px);

            color:white;

            text-align:center;
        }

        .icon{
            font-size:58px;
            margin-bottom:18px;
        }

        h1{
            font-size:28px;
            margin-bottom:10px;
        }

        .subtitle{
            color:#cbd5e1;
            line-height:1.6;
            margin-bottom:30px;
            font-size:15px;
        }

        input{

            width:100%;

            padding:14px 16px;

            border:none;

            border-radius:14px;

            background:#1e293b;

            color:white;

            font-size:15px;

            outline:none;

            margin-bottom:20px;

            border:1px solid rgba(255,255,255,0.08);
        }

        input:focus{
            border:1px solid #3b82f6;
            box-shadow:0 0 12px rgba(59,130,246,0.4);
        }

        button{

            width:100%;

            padding:14px;

            border:none;

            border-radius:14px;

            background:linear-gradient(
                135deg,
                #2563eb,
                #3b82f6
            );

            color:white;

            font-weight:bold;

            font-size:15px;

            cursor:pointer;

            transition:0.2s ease;
        }

        button:hover{
            transform:translateY(-2px);
            opacity:0.95;
        }

        .footer{
            margin-top:25px;
            font-size:13px;
            color:#94a3b8;
        }

    </style>

</head>

<body>

    <div class="card">

        <div class="icon">🔐</div>

        <h1>Secure Inventory Access</h1>

        <p class="subtitle">
            Verify your password before accessing
            inventory controls and stock adjustments.
        </p>

		<form method="POST">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<input
type="password"
name="password"
required
placeholder="Enter account password"
>

<button type="submit">
Verify Access
</button>

</form>

                <div class="footer">
            OptiGain Security System
        </div>

    </div>

</body>
</html>
