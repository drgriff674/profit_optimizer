<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<title>Verify – OptiGain</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden"
style="
background:
radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 35%),
radial-gradient(circle at bottom right, rgba(59,130,246,0.15), transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
">

<!-- Glow Background -->
<div class="absolute inset-0 opacity-30 pointer-events-none">

<div class="absolute top-[-120px] left-[-120px]
w-96 h-96 bg-blue-500 rounded-full blur-3xl">
</div>

<div class="absolute bottom-[-120px] right-[-120px]
w-96 h-96 bg-indigo-500 rounded-full blur-3xl">
</div>

</div>

<!-- Main Card -->
<div class="relative z-10 w-full max-w-md p-8 rounded-3xl border backdrop-blur-xl shadow-2xl"
style="
background: rgba(15,23,42,0.82);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.45);
">

<div class="flex justify-center mb-5">

<div class="w-16 h-16 rounded-2xl flex items-center justify-center"
style="
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 30px rgba(37,99,235,0.45);
">

<i data-lucide="shield-check" class="w-8 h-8 text-white"></i>

</div>

</div>

<h2 class="text-3xl font-bold text-center mb-3 tracking-tight">
Secure Verification
</h2>

<p class="text-sm text-center text-slate-300 mb-7 leading-relaxed">
Enter the 6-digit verification code sent to your email address.
</p>

<!-- TIMER -->
<div class="text-center mb-6">
  <div class="text-sm opacity-70">Code expires in</div>
  <div id="countdown" class="text-2xl font-bold tracking-widest mt-1">
    05:00
  </div>
</div>

<form method="POST" class="space-y-5">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<!-- OTP BOXES -->
<div class="flex justify-center gap-3 mb-2">
  <input class="otp-box" maxlength="1">
  <input class="otp-box" maxlength="1">
  <input class="otp-box" maxlength="1">
  <input class="otp-box" maxlength="1">
  <input class="otp-box" maxlength="1">
  <input class="otp-box" maxlength="1">
</div>

<input type="hidden" name="otp" id="otpHidden">

<button
type="submit"
class="w-full py-3 rounded-xl text-white font-semibold transition-all duration-200 hover:scale-[1.02] hover:opacity-95"
style="
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
">
Verify Code
</button>

</form>

<div class="text-center mt-5">
<p class="text-sm opacity-70">Didn’t receive the code?</p>

<a href="{{ url_for('resend_otp') }}"
class="font-semibold hover:underline"
style="color: var(--og-primary);">
Resend code
</a>
</div>

</div>

<!-- OTP STYLE -->
<style>

.otp-box {

  width: 52px;
  height: 62px;

  text-align: center;

  font-size: 24px;
  font-weight: 700;

  border-radius: 16px;

  border: 1px solid rgba(255,255,255,0.08);

  background: rgba(255,255,255,0.04);

  color: white;

  backdrop-filter: blur(8px);

  transition: all 0.2s ease;
}

.otp-box:focus {

  outline: none;

  border-color: #3b82f6;

  box-shadow:
    0 0 0 3px rgba(59,130,246,0.25),
    0 10px 25px rgba(59,130,246,0.25);

  transform: translateY(-2px);
}

</style>

<!-- OTP LOGIC -->
<script>
const inputs = document.querySelectorAll(".otp-box");
const hidden = document.getElementById("otpHidden");

// auto focus first box
inputs[0].focus();

inputs.forEach((input, index) => {

  input.addEventListener("input", () => {
    if (input.value.length === 1 && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
    updateHidden();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && index > 0) {
      inputs[index - 1].focus();
    }
  });

});

// paste support
document.addEventListener("paste", (e) => {
  const paste = e.clipboardData.getData("text").slice(0,6);
  paste.split("").forEach((char, i) => {
    if(inputs[i]) inputs[i].value = char;
  });
  updateHidden();
});

function updateHidden(){
  hidden.value = Array.from(inputs).map(i => i.value).join("");
}
</script>

<!-- TIMER -->
<script>
const otpTime = Math.floor({{ session.get("otp_time", 0) }});
const expiry = otpTime + 300;

function updateTimer(){
  const now = Math.floor(Date.now() / 1000);
  let remaining = Math.max(0, expiry - now);

  const m = Math.floor(remaining / 60);
  const s = remaining % 60;

  document.getElementById("countdown").innerText =
    String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

<script>
lucide.createIcons();
</script>

</body>
</html>
