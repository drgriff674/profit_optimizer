<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password – OptiGain</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="min-h-screen flex items-center justify-center relative overflow-hidden"
style="
background:
radial-gradient(circle at top left, rgba(37,99,235,0.18), transparent 35%),
radial-gradient(circle at bottom right, rgba(59,130,246,0.14), transparent 35%),
linear-gradient(135deg,#020617,#0f172a,#111827);
color:white;
">

<!-- Glow Background -->
<div class="absolute inset-0 opacity-30 pointer-events-none">

<div class="absolute top-[-120px] left-[-120px]
w-96 h-96 bg-blue-500 rounded-full blur-3xl">
</div>

<div class="absolute bottom-[-120px] right-[-120px]
w-96 h-96 bg-indigo-500 rounded-full blur-3xl">
</div>

</div>

<!-- Card -->
<div class="relative z-10 w-full max-w-md p-8 rounded-3xl border backdrop-blur-xl shadow-2xl"
style="
background: rgba(15,23,42,0.82);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.45);
">

<!-- Icon -->
<div class="flex justify-center mb-5">

<div class="w-16 h-16 rounded-2xl flex items-center justify-center"
style="
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 30px rgba(37,99,235,0.45);
">

<i data-lucide="shield-alert" class="w-8 h-8 text-white"></i>

</div>

</div>

<!-- Heading -->
<h2 class="text-3xl font-bold text-center mb-3 tracking-tight">
Forgot Password?
</h2>

<p class="text-sm text-center text-slate-300 mb-7 leading-relaxed">
Enter your account email address and we’ll send you a secure verification code to reset your password.
</p>

<!-- Form -->
<form method="POST" class="space-y-5">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div class="relative">

<input
type="email"
name="email"
required
placeholder="Enter your email"
class="w-full rounded-2xl px-4 py-3 border transition-all duration-200 focus:ring-2"
style="
background: rgba(255,255,255,0.04);
border-color: rgba(255,255,255,0.08);
color:white;
backdrop-filter: blur(10px);
"
/>

</div>

<button
type="submit"
class="w-full py-3 rounded-2xl text-white font-semibold transition-all duration-200 hover:scale-[1.02] hover:opacity-95"
style="
background:linear-gradient(135deg,#2563eb,#3b82f6);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
">

Send Reset Code

</button>

</form>

<!-- Back -->
<div class="text-center mt-6">

<a href="{{ url_for('login') }}"
class="text-sm font-medium hover:underline"
style="color:#60a5fa;">

Back to login

</a>

</div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
