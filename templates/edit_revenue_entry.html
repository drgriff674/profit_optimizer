<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OptiGain • Edit Revenue Entry</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/output.css') }}">

</head>

<body class="min-h-screen bg-sky-50 dark:bg-slate-950 transition-colors">

<!-- Loader -->
<div id="pageLoader"
class="fixed inset-0 hidden z-50 flex items-center justify-center
bg-white dark:bg-slate-900">
<div class="text-lg font-semibold animate-pulse">
Saving...
</div>
</div>

<!-- Header -->
<header
class="flex items-center justify-between px-6 py-4
bg-white dark:bg-slate-900
border-b border-slate-200 dark:border-slate-800">

<div class="flex items-center gap-3">
<img src="{{ url_for('static', filename='logo.png') }}"
class="h-9">
<h1 class="text-lg font-semibold text-slate-900 dark:text-white">
Edit Revenue Entry
</h1>
</div>

<div class="flex items-center gap-4">

<a href="{{ url_for('revenue_entry') }}"
class="px-4 py-2 rounded-lg text-sm font-medium
text-slate-600 dark:text-slate-300
hover:bg-blue-600 hover:text-white transition">
⬅ Back
</a>

<button
id="darkToggle"
class="w-9 h-9 rounded-full bg-blue-600 text-white
shadow hover:bg-blue-700 transition">
🌙
</button>

</div>

</header>

<!-- Main -->
<main class="flex items-center justify-center px-4 py-12">

<div class="w-full max-w-md
bg-white dark:bg-slate-900
border border-slate-200 dark:border-slate-800
rounded-2xl shadow-xl p-8">

<div class="text-center mb-7">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">
✏ Update Revenue Split
</h2>

<p class="text-sm mt-2 text-slate-500 dark:text-slate-400">
Modify this revenue entry and save changes.
</p>
</div>

<form id="editRevenueForm" class="space-y-5">

<input type="hidden"
name="csrf_token"
value="{{ csrf_token() }}">

<!-- Category -->
<div>
<label
class="block mb-2 text-sm font-medium
text-slate-700 dark:text-slate-300">
Category
</label>

<input
name="category"
value="{{ entry.category }}"
required
class="w-full rounded-xl border
border-slate-300 dark:border-slate-700
bg-white dark:bg-slate-800
px-4 py-3
text-slate-900 dark:text-white
focus:ring-2 focus:ring-blue-500
outline-none"
/>
</div>

<!-- Amount -->
<div>
<label
class="block mb-2 text-sm font-medium
text-slate-700 dark:text-slate-300">
Amount (KSh)
</label>

<input
type="number"
step="0.01"
name="amount"
value="{{ entry.amount }}"
required
class="w-full rounded-xl border
border-slate-300 dark:border-slate-700
bg-white dark:bg-slate-800
px-4 py-3
text-slate-900 dark:text-white
focus:ring-2 focus:ring-green-500
outline-none"
/>
</div>

<button
id="saveBtn"
type="submit"
class="w-full rounded-xl
bg-gradient-to-r from-blue-600 to-blue-500
hover:from-blue-700 hover:to-blue-600
text-white font-semibold py-3
shadow-md hover:shadow-lg
transition">

Save Changes

</button>

</form>

</div>

</main>

<script>
// dark mode
const toggle=document.getElementById("darkToggle");
if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}

toggle?.addEventListener("click",()=>{
const d=document.documentElement.classList.toggle("dark");
localStorage.setItem("theme",d?"dark":"light");
});
</script>

<script>
document.getElementById("editRevenueForm")
.addEventListener("submit",function(e){

e.preventDefault();

const category=
document.querySelector("[name='category']").value;

const amount=
document.querySelector("[name='amount']").value;

const csrf=
document.querySelector('[name="csrf_token"]').value;

const entryId={{ entry.id }};

if(!navigator.onLine){
alert("📴 You must be online to edit revenue");
return;
}

const btn=document.getElementById("saveBtn");
btn.innerText="Saving...";
btn.disabled=true;

document
.getElementById("pageLoader")
.classList.remove("hidden");

fetch(/revenue/entry/${entryId}/edit,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-CSRFToken":csrf
},
body:JSON.stringify({
category:category,
amount:amount
})
})

.then(response=>{
if(!response.ok){
throw new Error("Update failed");
}
return response.json();
})

.then(data=>{

if(data.success){
btn.innerText="Saved ✅";

setTimeout(()=>{
window.location.href="/revenue_entry";
},500);
}

})

.catch(error=>{
console.error(error);

document
.getElementById("pageLoader")
.classList.add("hidden");

btn.disabled=false;
btn.innerText="Save Changes";

alert("❌ Failed to update revenue entry");
});

});
</script>

<script src="{{ url_for('static', filename='js/navigation.js') }}"></script>

</body>
</html>
