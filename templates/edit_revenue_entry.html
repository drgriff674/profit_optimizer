<!DOCTYPE html>
<html>
<head>
  <title>Edit Revenue Entry</title>
</head>
<body class="bg-slate-100 p-6">

  <h1 class="text-lg font-semibold mb-4">✏️ Edit Revenue Entry</h1>

  <form id="editRevenueForm" class="space-y-4 bg-white p-4 rounded shadow">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">


    <div>
      <label class="block text-sm">Category</label>
      <input
        name="category"
        value="{{ entry.category }}"
        class="border p-2 w-full"
        required
      >
    </div>

    <div>
      <label class="block text-sm">Amount (KSh)</label>
      <input
        type="number"
        step="0.01"
        name="amount"
        value="{{ entry.amount }}"
        class="border p-2 w-full"
        required
      >
    </div>

    <button class="bg-blue-600 text-white px-4 py-2 rounded">
      Save Changes
    </button>

  </form>

<script>

document.getElementById("editRevenueForm").addEventListener("submit", function(e) {

    const category = document.querySelector("[name='category']").value;
    const amount = document.querySelector("[name='amount']").value;

    const entryId = {{ entry.id }};

    // 🔴 OFFLINE MODE
   if (!navigator.onLine) {
    e.preventDefault();
    alert("📴 You must be online to edit revenue");
    return;
}

    // 🟢 ONLINE MODE
    e.preventDefault();

const csrf = document.querySelector('[name="csrf_token"]').value;


fetch(`/revenue/entry/${entryId}/edit`, {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrf
    },

            body: JSON.stringify({
            category: category,
            amount: amount
        })
    })
   .then(() => {
    window.location.href = "/revenue_entry";
})
.catch(() => {
    alert("❌ Failed to update");
});

});


</script>

</body>
</html>
