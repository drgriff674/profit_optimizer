<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OptiGain • Profit Calculator</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="min-h-screen transition-colors"
style="background: var(--og-surface); color: var(--og-text-main);">

<!-- HEADER -->
<header class="flex items-center justify-between px-6 py-4 border-b"
style="border-color: var(--og-border-subtle);">

<div class="flex items-center gap-3">
<img src="{{ url_for('static', filename='logo.png') }}" class="h-8">
<h1 class="text-lg font-semibold">
📊 Profit Calculator
</h1>
</div>

<div class="flex items-center gap-4">

<a href="{{ url_for('dashboard') }}"
class="text-sm opacity-70 hover:opacity-100">
⬅ Dashboard
</a>

<!-- DARK MODE -->
<button id="darkToggle"
class="w-10 h-10 rounded-full
bg-slate-200 dark:bg-slate-700
hover:scale-105 transition
flex items-center justify-center">
🌙
</button>

</div>

</header>

<!-- MAIN -->
<main class="flex justify-center py-10 px-4">

<div class="w-full max-w-md p-7 rounded-3xl shadow-xl border"
style="
background: var(--og-surface);
border-color: var(--og-border-subtle);
">

<h2 class="text-3xl font-bold text-center mb-2">
Profit Calculator
</h2>

<p class="text-sm text-center opacity-70 mb-7">
Calculate profit in KES and convert instantly
</p>

<!-- INPUTS -->
<div class="space-y-5">

<!-- REVENUE -->
<div>
<label class="block text-sm font-medium mb-2">
Revenue (KES)
</label>

<input
id="revenue"
type="number"
placeholder="Enter revenue"
class="w-full px-4 py-3 rounded-xl border
focus:ring-2 focus:ring-blue-500 outline-none"
style="
background: var(--og-surface);
border-color: var(--og-border-subtle);
">
</div>

<!-- EXPENSES -->
<div>
<label class="block text-sm font-medium mb-2">
Expenses (KES)
</label>

<input
id="expenses"
type="number"
placeholder="Enter expenses"
class="w-full px-4 py-3 rounded-xl border
focus:ring-2 focus:ring-blue-500 outline-none"
style="
background: var(--og-surface);
border-color: var(--og-border-subtle);
">
</div>

<!-- CURRENCY -->
<div>

<label class="block text-sm font-medium mb-2">
🌍 Display Currency
</label>

<select
id="currency"
class="w-full px-4 py-3 rounded-xl border font-medium
focus:ring-2 focus:ring-blue-500 outline-none"
style="
background: var(--og-surface);
border-color: var(--og-border-subtle);
">

<option value="KES" selected>🇰🇪 KSh</option>
<option value="USD">🇺🇸 $</option>
<option value="EUR">🇪🇺 €</option>
<option value="GBP">🇬🇧 £</option>
<option value="NGN">🇳🇬 ₦</option>
<option value="ZAR">🇿🇦 R</option>
<option value="INR">🇮🇳 ₹</option>
<option value="CNY">🇨🇳 ¥</option>
<option value="JPY">🇯🇵 ¥</option>

</select>

<p class="text-xs opacity-60 mt-2">
Choose a currency to instantly convert profit
</p>

</div>

<button
id="calculateBtn"
class="w-full py-3 rounded-xl text-white font-semibold
bg-gradient-to-r from-blue-600 to-blue-500
hover:scale-[1.01] transition">
Calculate Profit
</button>

</div>

<!-- RESULT -->
<div id="resultBox"
class="hidden mt-7 text-center p-5 rounded-2xl border"
style="
background: rgba(37,99,235,0.08);
border-color: rgba(37,99,235,0.2);
">

<p class="text-sm opacity-70">
Net Profit
</p>

<p id="profitKES"
class="text-lg font-semibold mt-2">
</p>

<p id="profitConverted"
class="text-3xl font-bold mt-3">
</p>

</div>

</div>

</main>

<script>

/* BASE KES */
let rates = {
KES:1,
USD:0.0078,
EUR:0.0072,
GBP:0.0062,
NGN:12.5,
ZAR:0.14,
INR:0.65,
CNY:0.056,
JPY:1.1
};

let profitKES = null;

/* LIVE RATES */
fetch("https://api.exchangerate.host/latest?base=KES")
.then(res=>res.json())
.then(data=>{
if(data && data.rates){
rates=data.rates;
rates["KES"]=1;
}
})
.catch(()=>console.log("Using fallback rates"));

/* CALCULATE */
document.getElementById("calculateBtn").onclick=()=>{

const revenue=
Number(document.getElementById("revenue").value);

const expenses=
Number(document.getElementById("expenses").value);

if(isNaN(revenue)||isNaN(expenses)) return;

profitKES=revenue-expenses;

document
.getElementById("resultBox")
.classList.remove("hidden");

updateDisplay();

};

function updateDisplay(){

const currency=
document.getElementById("currency").value;

const symbols={
KES:"🇰🇪 KSh",
USD:"🇺🇸 $",
EUR:"🇪🇺 €",
GBP:"🇬🇧 £",
NGN:"🇳🇬 ₦",
ZAR:"🇿🇦 R",
INR:"🇮🇳 ₹",
CNY:"🇨🇳 ¥",
JPY:"🇯🇵 ¥"
};

document.getElementById("profitKES").textContent=
"KES: "+profitKES.toFixed(2);

const converted=
profitKES*(rates[currency]||1);

document.getElementById("profitConverted").textContent=
symbols[currency]+" "+converted.toFixed(2);

}

document
.getElementById("currency")
.addEventListener("change",()=>{
if(profitKES!==null) updateDisplay();
});

/* DARK MODE */
const btn=document.getElementById("darkToggle");
const root=document.documentElement;

if(localStorage.getItem("theme")==="dark"){
root.classList.add("dark");
}

btn.addEventListener("click",()=>{
const dark=root.classList.toggle("dark");
localStorage.setItem(
"theme",
dark?"dark":"light"
);
});

</script>

</body>
</html>
