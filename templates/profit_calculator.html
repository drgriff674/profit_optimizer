<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OptiGain • Profit Calculator</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="min-h-screen"
      style="background: var(--og-surface); color: var(--og-text-main);">

<!-- HEADER -->
<header class="flex items-center justify-between px-6 py-4 border-b"
        style="border-color: var(--og-border-subtle);">

  <div class="flex items-center gap-3">
    <img src="{{ url_for('static', filename='logo.png') }}" class="h-8">
    <h1 class="text-lg font-semibold">Profit Calculator</h1>
  </div>

  <a href="{{ url_for('dashboard') }}" class="text-sm opacity-70 hover:opacity-100">
    ⬅ Dashboard
  </a>

</header>

<!-- MAIN -->
<main class="flex justify-center py-10 px-4">

<div class="w-full max-w-md p-6 rounded-2xl shadow border"
     style="background: var(--og-surface); border-color: var(--og-border-subtle);">

<h2 class="text-2xl font-bold text-center mb-2">📊 Profit Calculator</h2>
<p class="text-sm text-center opacity-70 mb-6">
Calculate profit in KES and convert instantly
</p>

<!-- INPUTS -->
<div class="space-y-4">

<input id="revenue" type="number" placeholder="Revenue (KES)"
class="w-full px-4 py-3 rounded-lg border"
style="background: var(--og-surface); border-color: var(--og-border-subtle);">

<input id="expenses" type="number" placeholder="Expenses (KES)"
class="w-full px-4 py-3 rounded-lg border"
style="background: var(--og-surface); border-color: var(--og-border-subtle);">

<!-- CURRENCY -->
<select id="currency"
class="w-full px-4 py-3 rounded-lg border"
style="background: var(--og-surface); border-color: var(--og-border-subtle);">

<option value="KES">🇰🇪 KES (KSh)</option>
<option value="USD">🇺🇸 USD ($)</option>
<option value="EUR">🇪🇺 EUR (€)</option>
<option value="GBP">🇬🇧 GBP (£)</option>
<option value="NGN">🇳🇬 NGN</option>
<option value="ZAR">🇿🇦 ZAR</option>
<option value="INR">🇮🇳 INR</option>
<option value="CNY">🇨🇳 CNY</option>
<option value="JPY">🇯🇵 JPY</option>

</select>

<button id="calculateBtn"
class="w-full py-3 rounded-lg text-white font-semibold"
style="background: var(--og-primary);">
Calculate Profit
</button>

</div>

<!-- RESULT -->
<div id="resultBox"
class="hidden mt-6 text-center p-4 rounded-xl border"
style="background: rgba(37,99,235,0.08); border-color: rgba(37,99,235,0.2);">

<p class="text-sm opacity-70">Net Profit</p>

<p id="profitKES" class="text-lg font-semibold mt-1"></p>
<p id="profitConverted" class="text-2xl font-bold mt-2"></p>

</div>

</div>

</main>

<!-- SCRIPT -->
<script>

/* 🔥 BASE = KES */
let rates = {
  KES: 1,
  USD: 0.0078,
  EUR: 0.0072,
  GBP: 0.0062,
  NGN: 12.5,
  ZAR: 0.14,
  INR: 0.65,
  CNY: 0.056,
  JPY: 1.1
};

let profitKES = null;

/* 🔥 OPTIONAL: LIVE RATES */
fetch("https://api.exchangerate.host/latest?base=KES")
.then(res => res.json())
.then(data => {
  if(data && data.rates){
    rates = data.rates;
    rates["KES"] = 1;
  }
})
.catch(()=>console.log("Using fallback rates"));

/* CALCULATE */
document.getElementById("calculateBtn").onclick = () => {

  const revenue = Number(document.getElementById("revenue").value);
  const expenses = Number(document.getElementById("expenses").value);

  if(isNaN(revenue) || isNaN(expenses)) return;

  profitKES = revenue - expenses;

  document.getElementById("resultBox").classList.remove("hidden");

  updateDisplay();
};

function updateDisplay(){
  const currency = document.getElementById("currency").value;

  document.getElementById("profitKES").textContent =
    "KES: " + profitKES.toFixed(2);

  const converted = profitKES * (rates[currency] || 1);

  document.getElementById("profitConverted").textContent =
    converted.toFixed(2) + " " + currency;
}

document.getElementById("currency").addEventListener("change", ()=>{
  if(profitKES !== null) updateDisplay();
});

</script>

</body>
</html>
