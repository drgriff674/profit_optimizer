<!DOCTYPE html>
<html>
<head>
<title>Customer Support</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-6 shadow rounded-xl text-center">

<h2 class="text-xl font-bold mb-4">
Customer Support
</h2>

<a href="{{ url_for('dashboard') }}"
   class="inline-block mb-4 px-4 py-2 rounded bg-gray-200 hover:bg-gray-300">
   ← Back to Dashboard
</a>

<p class="mb-4">
If you need help using OptiGain, contact us anytime.
</p>

<div class="mb-3">
📧 Email:  
<strong>optigaintechnologies@gmail.com</strong>
</div>

<div class="mb-4">
📞 Phone / WhatsApp:  
<strong>0702432710</strong>
</div>

<p class="text-sm opacity-70">
Our team usually responds within 24 hours.
</p>

</div>

<script>
let dashboardHTML = null;

// preload dashboard in background
fetch("/dashboard")
  .then(res => res.text())
  .then(html => {
    dashboardHTML = html;
  });

// intercept dashboard click
document.addEventListener("click", function(e) {
  const link = e.target.closest("a");
  if (!link) return;

  const href = link.getAttribute("href");

  if (href === "/dashboard" && dashboardHTML) {
    e.preventDefault();

    document.open();
    document.write(dashboardHTML);
    document.close();
  }
});
</script>


</body>
</html>
