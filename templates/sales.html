<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales - OptiGain</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta name="csrf-token" content="{{ csrf_token() }}">

<style>
:root {
  --bg: #f9fafb;
  --card: #ffffff;
  --text: #111827;
}
.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
}
body {
  background: var(--bg);
  color: var(--text);
}
</style>
</head>

<body class="p-4 transition-colors">

<!-- TOP BAR -->
<div class="flex justify-between items-center mb-6">

  <div class="flex items-center gap-3">
    <a href="{{ url_for('dashboard') }}"
       class="px-3 py-1 rounded bg-gray-300 hover:bg-gray-400 text-sm">
       ← Dashboard
    </a>

    <h1 class="text-xl font-bold">🧾 Sales</h1>
  </div>

  <button id="darkToggle"
    class="px-3 py-1 rounded bg-gray-800 text-white">
    🌙
  </button>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<!-- PRODUCTS -->
<div class="p-4 rounded-xl shadow" style="background: var(--card);">
  <h3 class="font-semibold mb-3">Products</h3>

  <!-- ADD PRODUCT -->
  <div class="mb-4 space-y-2">
    <input id="pname"
           placeholder="Product name"
           class="w-full px-2 py-1 rounded border text-black">

    <input id="pprice"
           type="number"
           placeholder="Price"
           class="w-full px-2 py-1 rounded border text-black">

    <button onclick="addProduct()"
      class="w-full bg-purple-600 text-white py-1 rounded hover:opacity-90">
      ➕ Add Product
    </button>
  </div>

  <div class="space-y-2">
    {% for p in products %}
    <button
      onclick="addItem({{ p.id }}, '{{ p.name }}', {{ p.price }})"
      class="w-full flex justify-between px-3 py-2 rounded bg-green-600 text-white hover:opacity-90">

      <span>{{ p.name }}</span>
      <span>KSh {{ p.price }}</span>
    </button>
    {% endfor %}
  </div>
</div>

<!-- CART -->
<div class="p-4 rounded-xl shadow" style="background: var(--card);">
  <h3 class="font-semibold mb-3">Cart</h3>

  <ul id="cart" class="space-y-2 text-sm"></ul>

  <div class="mt-4 font-semibold">
    Total: KSh <span id="total">0</span>
  </div>

  <button onclick="createSale()"
    class="mt-4 w-full bg-blue-600 text-white py-2 rounded hover:opacity-90">
    Create Sale
  </button>
</div>

<!-- RECENT SALES -->
<div class="p-4 rounded-xl shadow" style="background: var(--card);">
  <h3 class="font-semibold mb-3">Recent Sales</h3>

  <ul id="salesList" class="text-sm space-y-2"></ul>

</div>

</div>

<script>
let cart = [];
let previousSales = {};

// =======================
// CART RENDER
// =======================
function renderCart() {
    const el = document.getElementById("cart");
    const totalEl = document.getElementById("total");

    el.innerHTML = "";

    let total = 0;

    cart.forEach((item, i) => {
        total += item.price * item.quantity;

        el.innerHTML += `
          <li class="flex justify-between items-center">
            <span>${item.name} x${item.quantity}</span>
            <div class="flex gap-2">
              <button onclick="decreaseQty(${i})">➖</button>
              <button onclick="increaseQty(${i})">➕</button>
              <button onclick="removeItem(${i})">❌</button>
            </div>
          </li>
        `;
    });

    totalEl.innerText = total;
}

// =======================
// ADD ITEM
// =======================
function addItem(id, name, price) {
    const existing = cart.find(i => i.product_id === id);

    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({ product_id: id, name, price, quantity: 1 });
    }

    renderCart();
}

// =======================
// QUANTITY CONTROLS
// =======================
function increaseQty(index) {
    cart[index].quantity += 1;
    renderCart();
}

function decreaseQty(index) {
    if (cart[index].quantity > 1) {
        cart[index].quantity -= 1;
    } else {
        cart.splice(index, 1);
    }
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

// =======================
// CREATE SALE
// =======================
function createSale() {

    if (cart.length === 0) {
        alert("Cart is empty 😅");
        return;
    }

    fetch("/sales/create", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({items: cart})
    })
    .then(r => r.json())
    .then(data => {
        alert("✅ Sale created: " + data.sale_id);

        cart = [];
        renderCart();
        location.reload();
    });
}

// =======================
// ADD PRODUCT
// =======================
function addProduct() {

    const name = document.getElementById("pname").value;
    const price = document.getElementById("pprice").value;

    if (!name || !price) {
        alert("Fill product name and price");
        return;
    }

    // ✅ GET CSRF TOKEN
    const csrfToken = document
        .querySelector('meta[name="csrf-token"]')
        .getAttribute("content");

    fetch("/products/create", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken   // ✅ THIS IS THE FIX
        },
        body: JSON.stringify({ name, price })
    })
    .then(async (r) => {
        const text = await r.text();

        try {
            return JSON.parse(text);
        } catch {
            throw new Error("Server returned non-JSON:\n" + text);
        }
    })
    .then(data => {
        if (data.error) {
            alert("❌ " + data.error);
            return;
        }

        alert("✅ Product added");

        document.getElementById("pname").value = "";
        document.getElementById("pprice").value = "";

        location.reload();
    })
    .catch(err => {
        console.error("FRONTEND ERROR:", err);
        alert("Something broke — check console");
    });
}

function loadSales() {
    fetch("/api/sales")
    .then(r => r.json())
    .then(data => {

        const el = document.getElementById("salesList");
        el.innerHTML = "";

        data.sales.forEach(s => {

            const prevStatus = previousSales[s.sale_id];

            const justPaid = prevStatus === "pending" && s.status === "completed";

            previousSales[s.sale_id] = s.status;

            el.innerHTML += `
              <li id="sale-${s.sale_id}" class="flex flex-col border-b pb-2 ${justPaid ? 'bg-green-100' : ''}">

                <div class="flex justify-between">
                  <span>${s.sale_id}</span>
                  <span>KSh ${s.total_amount}</span>
                  <span class="${s.status === 'completed' ? 'text-green-500' : 'text-yellow-500'}">
                    ${s.status}
                  </span>
                </div>

                ${
                  s.status === "pending"
                  ? `<div class="text-xs text-gray-500 mt-1">
                       Paybill: <b>YOUR_PAYBILL</b> |
                       Account: <b>${s.sale_id}</b>
                     </div>`
                  : ""
                }

                ${
                  justPaid
                  ? `<div class="text-green-600 text-xs mt-1">
                       💰 Payment received
                     </div>`
                  : ""
                }

              </li>
            `;
        });
    });
}

setInterval(loadSales, 3000);

// =======================
// DARK MODE
// =======================
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("darkToggle");
  const root = document.documentElement;

  loadSales();

  if (localStorage.getItem("theme") === "dark") {
    root.classList.add("dark");
  }

  btn.onclick = () => {
    const dark = root.classList.toggle("dark");
    localStorage.setItem("theme", dark ? "dark" : "light");
  };
});
</script>

</body>
</html>
