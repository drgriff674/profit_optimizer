<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<title>Sales - OptiGain</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="csrf-token" content="{{ csrf_token() }}">

</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white transition">

<!-- TOP BAR -->
<div class="flex justify-between items-center mb-4 
            bg-white dark:bg-slate-800 
            border border-slate-200 dark:border-slate-700 
            rounded-xl px-4 py-3 shadow-sm">

  <div class="flex items-center gap-3">
    <a href="{{ url_for('dashboard') }}"
       class="px-3 py-1.5 rounded-lg text-sm font-medium
              bg-slate-100 hover:bg-slate-200 
              dark:bg-slate-700 dark:hover:bg-slate-600 
              dark:text-white transition">
       ← Dashboard
    </a>

    <h1 class="text-lg font-semibold text-slate-900 dark:text-white">
      Sales
    </h1>
  </div>

{% if request.args.get("success") %}
<div class="mb-4 p-3 rounded-lg bg-green-100 text-green-700 text-sm">
  ✅ Payment successful!
</div>
{% endif %}

  <!-- ✅ NOW PROPERLY POSITIONED -->
  <button id="darkToggle"
    class="px-3 py-1.5 rounded-lg text-sm 
           bg-slate-100 dark:bg-slate-700 
           hover:bg-slate-200 dark:hover:bg-slate-600 
           text-slate-800 dark:text-white 
           transition">
    🌙
  </button>

</div>

<!-- GRID -->
<div class="grid grid-cols-3 gap-6 h-[85vh] overflow-hidden">

<!-- PRODUCTS -->
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm flex flex-col overflow-hidden">
  <h3 class="font-semibold mb-3">Products</h3>

  <div class="mb-4 space-y-2">
   <input id="pname" placeholder="Product name"
       class="w-full px-3 py-2 rounded-lg border border-slate-300
              dark:border-slate-600
              bg-white dark:bg-slate-700
              text-sm text-slate-900 dark:text-white
              focus:ring-2 focus:ring-blue-500 focus:outline-none">

<input id="pprice" type="number" placeholder="Price"
       class="w-full px-3 py-2 rounded-lg border border-slate-300
              dark:border-slate-600
              bg-white dark:bg-slate-700
              text-sm text-slate-900 dark:text-white
              focus:ring-2 focus:ring-blue-500 focus:outline-none">


    <button onclick="addProduct()"
  class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg text-sm font-medium transition">
  ➕ Add Product
</button>
  </div>

  <div id="productsList" class="space-y-2 overflow-y-auto flex-1"></div>
</div>

<!-- CART -->
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm flex flex-col overflow-hidden p-4">

  <h3 class="font-semibold mb-3">Cart</h3>

  <ul id="cart" class="space-y-2 text-sm flex-1 overflow-y-auto"></ul>

  <!-- FIXED BOTTOM AREA -->
  <div class="border-t pt-3 mt-3">
    <div class="font-semibold mb-2">
      Total: KSh <span id="total">0</span>
    </div>

    <button onclick="createSale()"
  class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold text-sm shadow-sm transition active:scale-[0.98]">
  💳 Create Sale
</button>

  </div>

</div>

<!-- SALES -->
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm flex flex-col overflow-hidden p-4">
  <h3 class="font-semibold mb-3">Recent Sales</h3>

  <ul id="salesList" class="text-sm space-y-2 overflow-y-auto flex-1"></ul>
</div>

</div>

<script>
let cart = [];
let currentEditId = null;
let previousSales = {};

// ================= CART =================
function renderCart() {
    const el = document.getElementById("cart");
    const totalEl = document.getElementById("total");

    el.innerHTML = "";
    let total = 0;

    cart.forEach((item, i) => {
        total += item.price * item.quantity;

        el.innerHTML += `
        <li class="flex justify-between items-center">
            <span>${item.name} x${item.quantity}</span>
           <div class="flex items-center overflow-hidden rounded-lg border border-slate-200 dark:border-slate-700">

    <!-- MINUS -->
    <button onclick="decreaseQty(${i})"
      class="px-3 py-1 
             bg-slate-100 hover:bg-slate-200 
             dark:bg-slate-700 dark:hover:bg-slate-600 
             text-slate-800 dark:text-white 
             text-sm font-medium">
      −
    </button>

    <!-- PLUS -->
    <button onclick="increaseQty(${i})"
      class="px-3 py-1 
             bg-slate-100 hover:bg-slate-200 
             dark:bg-slate-700 dark:hover:bg-slate-600 
             text-slate-800 dark:text-white 
             text-sm font-medium 
             border-x border-slate-200 dark:border-slate-700">
      +
    </button>

    <!-- REMOVE -->
    <button onclick="removeItem(${i})"
      class="px-3 py-1 
             bg-red-500 hover:bg-red-600 
             text-white text-sm font-medium">
      ✕
    </button>

</div>
        </li>`;
    });

    totalEl.innerText = total;
}

function addItem(id, name, price) {
    const existing = cart.find(i => i.product_id === id);
    if (existing) existing.quantity++;
    else cart.push({ product_id: id, name, price, quantity: 1 });

    renderCart();
}

function increaseQty(i){ cart[i].quantity++; renderCart(); }
function decreaseQty(i){ cart[i].quantity>1 ? cart[i].quantity-- : cart.splice(i,1); renderCart(); }
function removeItem(i){ cart.splice(i,1); renderCart(); }

// ================= PRODUCTS =================
function addProduct() {
    const name = pname.value;
    const price = pprice.value;
    if (!name || !price) return alert("Fill product name and price");

    const csrf = document.querySelector('meta[name="csrf-token"]').content;

    fetch("/products/create", {
        method: "POST",
        headers: {"Content-Type":"application/json","X-CSRFToken":csrf},
        body: JSON.stringify({name,price})
    })
    .then(r=>r.json())
    .then(()=>{ pname.value=""; pprice.value=""; loadProducts(); });
}

function loadProducts() {
    fetch("/api/products")
    .then(r=>r.json())
    .then(data=>{
        const el = document.getElementById("productsList");
        el.innerHTML = "";

        data.products.forEach(p=>{
            el.innerHTML += `
            <div class="flex items-center gap-2">

                <button onclick="addItem(${p.id}, '${p.name}', ${p.price})"
                 class="flex-1 flex justify-between items-center px-3 py-2 rounded-lg 
bg-slate-100 hover:bg-slate-200 
dark:bg-slate-700 dark:hover:bg-slate-600 
text-sm transition"
                  <span>${p.name}</span>
                  <span>KSh ${p.price}</span>
                </button>

                <button onclick="editProduct(${p.id}, '${p.name}', ${p.price})"
  class="px-2 py-1 text-xs rounded-lg 
         bg-slate-200 hover:bg-slate-300 
         dark:bg-slate-600 dark:hover:bg-slate-500 
         text-slate-800 dark:text-white 
         transition">
  Edit
</button>

                <button onclick="deleteProduct(${p.id})"
                  class="px-2 py-1 text-xs rounded-lg bg-red-500 hover:bg-red-600 text-white transition">
        Delete
      


            </div>`;
        });
    });
}

let currentDeleteId = null;

// ================= EDIT (MODAL) =================
function editProduct(id, name, price) {
    currentEditId = id;

    document.getElementById("editName").value = name;
    document.getElementById("editPrice").value = price;

    document.getElementById("editModal").classList.remove("hidden");
    document.getElementById("editModal").classList.add("flex");
}

function closeEditModal() {
    document.getElementById("editModal").classList.add("hidden");
}

function saveEdit() {
    const name = document.getElementById("editName").value;
    const price = document.getElementById("editPrice").value;

    const csrf = document.querySelector('meta[name="csrf-token"]').content;

    fetch(`/products/update/${currentEditId}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrf
        },
        body: JSON.stringify({ name, price })
    })
    .then(r => r.json())
    .then(() => {
        closeEditModal();
        loadProducts();
    });
}

// ================= DELETE (MODAL) =================
function deleteProduct(id) {
    currentDeleteId = id;

    document.getElementById("deleteModal").classList.remove("hidden");
    document.getElementById("deleteModal").classList.add("flex");
}

function closeDeleteModal() {
    document.getElementById("deleteModal").classList.add("hidden");
}

function confirmDelete() {
    const csrf = document.querySelector('meta[name="csrf-token"]').content;

    fetch(`/products/delete/${currentDeleteId}`, {
        method: "DELETE",
        headers: {
            "X-CSRFToken": csrf
        }
    })
    .then(r => r.json())
    .then(() => {
        closeDeleteModal();
        loadProducts();
    });
}

// ================= SALES =================
function createSale() {
    if (!cart.length) return alert("Cart is empty 😅");

    fetch("/sales/create", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({items:cart})
    })
    .then(r=>r.json())
    .then(()=>{
        cart=[]; renderCart(); loadSales();
    });
}

function deleteSale(saleId) {
    if (!confirm("Cancel this sale?")) return;

    fetch(`/sales/delete/${saleId}`, {
        method: "POST"
    })
   .then(r => r.json())
.then(data => {

    if (data.deleted > 0) {
        // ✅ real delete
        const el = document.getElementById("sale-" + saleId);
        if (el) {
            el.style.transition = "0.3s";
            el.style.opacity = "0";
            el.style.transform = "translateX(20px)";
            setTimeout(() => el.remove(), 300);
        }
    } else {
        alert("⚠️ Cannot delete (already paid or not found)");
    }

});

}

function loadSales() {
    fetch("/api/sales")
    .then(r => r.json())
    .then(data => {
        const el = document.getElementById("salesList");
el.innerHTML = "";

        data.sales.forEach(s => {

            const prevStatus = previousSales[s.sale_id];
            const justPaid = prevStatus === "pending" && s.status === "completed";

            previousSales[s.sale_id] = s.status;

            let existing = document.getElementById("sale-" + s.sale_id);

            const html = `
            <li id="sale-${s.sale_id}"
                class="flex flex-col border-b pb-2 ${justPaid ? 'bg-green-100' : ''}">

                <div class="flex justify-between">
                    <span>${s.sale_id}</span>
                    <span>KSh ${s.total_amount}</span>
                    <span class="${s.status==='completed'?'text-green-500':'text-yellow-500'}">
                        ${s.status}
                    </span>
                </div>

                
                    ${

s.status === "pending"  
? `<div class="mt-2 flex gap-2 items-center">  

     <a href="/pesapal/create-payment/${s.sale_id}"  
        class="px-3 py-1 text-xs rounded-lg bg-green-600 hover:bg-green-700 text-white">  
        💳 Pay Now  
     </a>  

     <button onclick="deleteSale('${s.sale_id}')"  
        class="px-3 py-1 text-xs rounded-lg bg-red-500 hover:bg-red-600 text-white">  
        ❌ Cancel  
     </button>

     <div class="text-xs text-blue-600 bg-blue-50 p-2 rounded">  
        Or pay via Paybill<br>  
        Account: <b>${s.sale_id}</b>  
     </div>  

   </div>`  
: ""}

                ${
                    justPaid
                    ? `<div class="text-green-600 text-xs mt-1">
                         💰 Payment received
                       </div>`
                    : ""
                }

            </li>`;

            if (existing) {
                existing.outerHTML = html;
            } else {
                el.innerHTML += html;
            }
        });
    });
}

// INIT
document.addEventListener("DOMContentLoaded",()=>{
    loadProducts();
    loadSales();

    setInterval(loadSales, 3000);	
});
</script>

<!-- EDIT MODAL -->
<div id="editModal"
     class="fixed inset-0 bg-black/40 hidden items-center justify-center">

  <div class="bg-white p-6 rounded-xl w-80 shadow-lg">
    <h2 class="text-lg font-semibold mb-4">Edit Product</h2>

    <input id="editName"
           class="w-full mb-3 px-2 py-1 border rounded text-black">

    <input id="editPrice"
           type="number"
           class="w-full mb-4 px-2 py-1 border rounded text-black">

    <div class="flex justify-between">
      <button onclick="closeEditModal()"
        class="px-3 py-1 bg-gray-400 text-white rounded">
        Cancel
      </button>

      <button onclick="saveEdit()"
        class="px-3 py-1 bg-blue-600 text-white rounded">
        Save
      </button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="deleteModal"
     class="fixed inset-0 bg-black/40 hidden items-center justify-center">

  <div class="bg-white p-6 rounded-xl w-80 shadow-lg text-center">

    <h2 class="text-lg font-semibold mb-3">Delete Product?</h2>
    <p class="text-sm text-gray-500 mb-4">
      This action cannot be undone
    </p>

    <div class="flex justify-center gap-3">
      <button onclick="closeDeleteModal()"
        class="px-3 py-1 bg-gray-400 text-white rounded">
        Cancel
      </button>

      <button onclick="confirmDelete()"
        class="px-3 py-1 bg-red-600 text-white rounded">
        Delete
      </button>
    </div>

  </div>
</div>

<script>
const toggle = document.getElementById("darkToggle");
const saved = localStorage.getItem("theme");

if (saved === "dark") {
  document.documentElement.classList.add("dark");
}

toggle.addEventListener("click", () => {
  const isDark = document.documentElement.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
});
</script>

</body>
</html>
