<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revenue Forecast – OptiGain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body class="min-h-screen transition-colors"
      style="background: var(--og-bg); color: var(--og-text-main);">

<!-- ✅ LOADER (FIXED) -->
<div id="pageLoader"
     class="fixed inset-0 bg-white dark:bg-slate-900 z-50 flex items-center justify-center hidden">
  <div class="text-lg font-semibold animate-pulse">
    Loading...
  </div>
</div>

<!-- HEADER -->
<header class="flex items-center justify-between px-4 py-4 border-b"
        style="border-color: var(--og-border); background: var(--og-surface);">

  <a href="{{ url_for('dashboard') }}"
     class="text-sm font-medium"
     style="color: var(--og-primary);">
     ⬅ Dashboard
  </a>

  <h1 class="text-lg font-semibold">
    📈 Revenue Forecast
  </h1>

  <!-- 🌙 DARK MODE BUTTON -->
  <button id="darkToggle"
          class="w-9 h-9 rounded-full bg-slate-200 dark:bg-slate-700">
    🌙
  </button>
</header>

<!-- CONTENT -->
<main class="p-4">

  <div class="rounded-xl shadow p-4"
       style="background: var(--og-surface);">

    {% if not_ready %}
      <p class="text-red-500 mb-3">
        ⚠️ Forecast needs at least 7 locked revenue days.
        Currently: {{ days }}
      </p>
    {% endif %}

    <p class="text-sm opacity-70 mb-3">
      AI projection with statistical confidence bands.
    </p>

    <p class="text-sm opacity-70 mb-3">
      Forecast horizon: {{ forecast_period }} days
    </p>

    <p class="text-sm font-semibold mb-3">
      Model confidence: {{ confidence_level }}
    </p>

    <div id="forecastChart" class="w-full h-[70vh]"></div>

  </div>

</main>

<!-- CHART SCRIPT -->
<script>
const dates = {{ dates | tojson | safe }};
const predictions = {{ predictions | tojson | safe }};
const upper = {{ upper | tojson | safe }};
const lower = {{ lower | tojson | safe }};
const actualDates = {{ actual_dates | tojson | safe }};
const actualValues = {{ actual_values | tojson | safe }};

if (!dates.length) {
  document.getElementById("forecastChart").innerHTML =
    "<p class='text-center opacity-70'>No forecast data yet</p>";
} else {

  const actualTrace = {
    x: actualDates,
    y: actualValues,
    type: 'scatter',
    mode: 'markers',
    name: 'Actual Revenue',
    marker: { size: 7 }
  };

  const forecastLine = {
    x: dates,
    y: predictions,
    type: 'scatter',
    mode: 'lines',
    name: 'AI Prediction',
    line: { width: 4 }
  };

  const upperBand = {
    x: dates,
    y: upper,
    type: 'scatter',
    mode: 'lines',
    line: { width: 0 },
    showlegend: false,
    hoverinfo: 'skip'
  };

  const lowerBand = {
    x: dates,
    y: lower,
    type: 'scatter',
    mode: 'lines',
    fill: 'tonexty',
    name: 'Confidence Range',
    line: { width: 0 },
    hoverinfo: 'skip'
  };

  Plotly.newPlot(
    "forecastChart",
    [actualTrace, upperBand, lowerBand, forecastLine],
    {
      paper_bgcolor: "transparent",
      plot_bgcolor: "transparent",
      hovermode: "x unified"
    },
    { responsive: true }
  );
}
</script>

<!-- 🌙 DARK MODE SCRIPT -->
<script>
const btn = document.getElementById("darkToggle");
const root = document.documentElement;

if (localStorage.getItem("theme") === "dark") {
  root.classList.add("dark");
}

btn?.addEventListener("click", () => {
  const isDark = root.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
});
</script>

<!-- ✅ GLOBAL NAVIGATION -->
<script src="{{ url_for('static', filename='js/navigation.js') }}"></script>

</body>
</html>
