<!DOCTYPE html>
<html>
<head>
<title>Settings</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="w-full max-w-lg p-6 shadow rounded-xl">

<h2 class="text-xl font-bold mb-4">
Settings
</h2>

<a href="{{ url_for('dashboard') }}"
class="inline-block mb-4 px-4 py-2 rounded bg-gray-200 hover:bg-gray-300">
← Back to Dashboard
</a>

<!-- TAB MENU -->

<div class="flex border-b mb-4">

<button onclick="showTab('account')" class="px-4 py-2 font-medium">
Account
</button>

<button onclick="showTab('security')" class="px-4 py-2 font-medium">
Security
</button>

<button onclick="showTab('billing')" class="px-4 py-2 font-medium">
Billing
</button>

<button onclick="showTab('support')" class="px-4 py-2 font-medium">
Support
</button>

</div>

<!-- ACCOUNT -->

<div id="account" class="tab">

<h3 class="font-semibold mb-2">Update Email</h3>

<form method="POST" action="{{ url_for('settings') }}">

<input
type="email"
name="email"
value="{{ user.email }}"
required
class="w-full border rounded px-3 py-2 mb-3"
/>

<button
type="submit"
class="w-full py-2 rounded bg-blue-600 text-white">
Update Email
</button>

</form>

</div>

<!-- SECURITY -->

<div id="security" class="tab hidden">

<h3 class="font-semibold mb-2">Change Password</h3>

<form method="POST" action="{{ url_for('change_password') }}">

<input
type="password"
name="current_password"
placeholder="Current password"
required
class="w-full border rounded px-3 py-2 mb-3"
/>

<input
type="password"
name="new_password"
placeholder="New password"
required
class="w-full border rounded px-3 py-2 mb-3"
/>

<button
type="submit"
class="w-full py-2 rounded bg-green-600 text-white">
Change Password
</button>

</form>

</div>

<!-- BILLING -->

<div id="billing" class="tab hidden">

<p class="mb-3">Your subscription status will appear here.</p>

<p class="text-sm opacity-70">
Billing features coming soon.
</p>

</div>

<!-- SUPPORT -->

<div id="support" class="tab hidden">

<p class="mb-3">
Need help? Contact us anytime.
</p>

<p>
📧 optigaintechnologies@gmail.com
</p>

<p>
📞 0702432710
</p>

</div>

</div>

<script>

function showTab(tab){

document.querySelectorAll(".tab").forEach(t=>{
t.classList.add("hidden");
});

document.getElementById(tab).classList.remove("hidden");

}

</script>

</body>
</html>
